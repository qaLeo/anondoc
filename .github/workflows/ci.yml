name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test — engine
        run: pnpm --filter @anondoc/engine test --run

      - name: Test — web (221 tests)
        run: pnpm --filter @anondoc/web test --run

      - name: Typecheck — backend
        run: pnpm --filter @anondoc/backend typecheck

      - name: Build — web
        run: pnpm --filter @anondoc/web build

      - name: Build — backend
        run: pnpm --filter @anondoc/backend build
